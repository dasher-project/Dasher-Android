name: Release

# Builds a signed, directly-installable release APK and publishes it as a
# GitHub Release on version tags - the Android equivalent of Dasher-Windows'
# build-installer.yml release step.
#
# The APK is signed with the debug key (see app/build.gradle.kts) so it's
# sideloadable with no secrets in CI. For the Play Store, replace that with a
# real release keystore from secrets and produce an AAB instead.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (DasherCore + pugixml submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (versions pinned in app/build.gradle.kts)
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK with tag
        run: |
          tag="${GITHUB_REF_NAME:-untagged}"
          mkdir -p out
          cp app/build/outputs/apk/release/*.apk "out/Dasher-Android-${tag}.apk"
          ls -l out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dasher-android-release-apk
          path: out/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: out/*.apk
